services:
  backend:
    build:
      context: ./backend
    environment:
      API_ENV: development
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:8080
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "8080:80"

